version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hair-analysis-db-prod
    environment:
      POSTGRES_DB: hair_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - hair-analysis-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hair-analysis-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hair-analysis-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hair-analysis-backend-prod
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      REPORTS_RENDER_TIMEOUT_MS: 30000
      REPORTS_RENDER_RETRIES: 2
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - hair-analysis-network
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hair-analysis-frontend-prod
    environment:
      VITE_API_URL: ${FRONTEND_API_URL}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - hair-analysis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: hair-analysis-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - hair-analysis-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  hair-analysis-network:
    driver: bridge
