version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: has-dev-db
    environment:
      POSTGRES_DB: hair_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - has-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: has-dev-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: hair_analysis
      JWT_SECRET: dev-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      UPLOADS_DIR: /app/uploads/vision
      UPLOADS_TTL_HOURS: 24
      UPLOADS_CLEAN_INTERVAL_MIN: 30
    ports:
      - "3001:3000"
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - has-net

  frontend:
    build:
      context: ./frontend
    container_name: has-dev-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api
      VITE_APP_NAME: Hair Analysis System
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - has-net

volumes:
  db_data:
  backend_uploads:

networks:
  has-net:
    driver: bridge
